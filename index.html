<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Braden Chan - Software Developer."
    />
    <title>Braden Chan</title>

    <!-- Open Graph / social link preview.
         TODO: og:image is most reliable as an ABSOLUTE url. Once you know the
         deploy domain, change /og-image.png to https://your-domain/og-image.png
         (and add an og:url) for full Facebook/LinkedIn support. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Braden Chan — Software Developer" />
    <meta
      property="og:description"
      content="Software developer building full-stack apps, physics simulations, and interactive 3D experiences."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Braden Chan — Software Developer" />
    <meta
      name="twitter:description"
      content="Software developer building full-stack apps, physics simulations, and interactive 3D experiences."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Fonts: Space Grotesk (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
